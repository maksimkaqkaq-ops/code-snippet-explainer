version: '3.9'

services:
  db:
    image: postgres:15
    container_name: snippets_db
    environment:
      POSTGRES_DB: snippets_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
